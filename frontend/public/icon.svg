    <rect x="20" y="55" width="12" height="24" rx="2" />
    <rect x="36" y="42" width="12" height="37" rx="2" />
    <rect x="52" y="28" width="12" height="51" rx="2" />
    <rect x="68" y="38" width="12" height="41" rx="2" />
